name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for insecure registry
        run: |
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_URL }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to Registry (HTTP)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/fastapi-test-app:latest
            ${{ secrets.REGISTRY_URL }}/fastapi-test-app:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "📥 Pulling image from HTTP registry..."
            docker pull ${{ secrets.REGISTRY_URL }}/fastapi-test-app:latest || true
            echo "🛑 Stopping old container..."
            docker stop fastapi-app 2>/dev/null || true
            docker rm fastapi-app 2>/dev/null || true
            echo "🚀 Starting new container..."
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart unless-stopped \
              ${{ secrets.REGISTRY_URL }}/fastapi-test-app:latest
            echo "✅ Deployment completed!"