name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --allow-insecure-entitlement security.insecure

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/fastapi-test-app:latest
            ${{ secrets.REGISTRY_URL }}/fastapi-test-app:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.REGISTRY_URL }}/fastapi-test-app:latest
            docker stop fastapi-app 2>/dev/null || true
            docker rm fastapi-app 2>/dev/null || true
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart unless-stopped \
              ${{ secrets.REGISTRY_URL }}/fastapi-test-app:latest
            echo "✅ Деплой завершён! Проверь: curl http://${{ secrets.VPS_HOST }}:8000"