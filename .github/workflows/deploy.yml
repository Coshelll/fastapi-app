name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "📦 Updating code on server..."
            cd /root
            rm -rf fastapi-app
            git clone https://github.com/${{ github.repository }}.git fastapi-app
            cd fastapi-app
            
            echo "🐳 Building Docker image on server..."
            docker build -t fastapi-app:latest .
            
            echo "🛑 Stopping old container..."
            docker stop fastapi-app 2>/dev/null || true
            docker rm fastapi-app 2>/dev/null || true
            
            echo "🚀 Starting new container..."
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              --restart unless-stopped \
              fastapi-app:latest
            
            echo "✅ Deployment completed!"